<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#0A0A0A"/>
  
  <!-- Grid Pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  </pattern>
  <rect width="400" height="400" fill="url(#grid)"/>
  
  <!-- Product Box -->
  <rect x="100" y="100" width="200" height="200" rx="12" fill="#141414" stroke="#2a2a2a" stroke-width="2"/>
  
  <!-- Inner Shadow -->
  <rect x="102" y="102" width="196" height="196" rx="10" fill="none" stroke="#0f0f0f" stroke-width="1"/>
  
  <!-- Package Icon -->
  <path d="M170 180 L200 165 L230 180 L230 230 L200 245 L170 230 Z" fill="none" stroke="#00F2FE" stroke-width="2.5" opacity="0.8"/>
  <path d="M170 180 L200 195 L200 245" fill="none" stroke="#00F2FE" stroke-width="2" opacity="0.6"/>
  <path d="M230 180 L200 195" fill="none" stroke="#00F2FE" stroke-width="2" opacity="0.6"/>
  
  <!-- Accent Line -->
  <line x1="170" y1="250" x2="230" y2="250" stroke="#00F2FE" stroke-width="2" opacity="0.4"/>
  
  <!-- Glow Effect -->
  <circle cx="200" cy="200" r="80" fill="none" stroke="#00F2FE" stroke-width="1" opacity="0.1"/>
  
  <!-- Text -->
  <text x="200" y="300" fill="#4a4a4a" font-family="system-ui, sans-serif" font-size="14" font-weight="500" text-anchor="middle" letter-spacing="2">HOLOVERIFY</text>
</svg>
